version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helm-backend
    environment:
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-community}
      - LICENSE_KEY=${LICENSE_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgresql://helm:changeme@postgres:5432/helm}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL:-http://clickhouse:9000}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-in-production}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - PORT=8080
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "8080:8080"
    networks:
      - helm-network
    restart: unless-stopped
    volumes:
      - ./backend/GeoLite2-Country.mmdb:/app/GeoLite2-Country.mmdb:ro
      - ./backend/GeoLite2-ASN.mmdb:/app/GeoLite2-ASN.mmdb:ro
    depends_on:
      - postgres
      - clickhouse

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: helm-frontend
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    ports:
      - "3000:80"
    networks:
      - helm-network
    restart: unless-stopped
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: helm-postgres
    environment:
      - POSTGRES_USER=helm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=helm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - helm-network
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: helm-clickhouse
    environment:
      - CLICKHOUSE_DB=helm
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
    ports:
      - "9000:9000"
      - "8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - helm-network
    restart: unless-stopped

networks:
  helm-network:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
