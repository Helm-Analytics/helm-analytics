version: '3.8'

# Cloud deployment configuration for Dokploy
# This extends the base docker-compose.yml with cloud-specific settings

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helm-backend-cloud
    environment:
      - DEPLOYMENT_MODE=cloud
      - DATABASE_URL=${DATABASE_URL}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY}
      - LICENSE_URL=http://license-server:8080
      - LICENSE_SECRET=${LICENSE_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8080
      - CORS_ORIGIN=${CORS_ORIGIN}
    ports:
      - "8080:8080"
    networks:
      - helm-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: helm-frontend-cloud
    environment:
      - VITE_API_URL=${API_URL}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - helm-network
    restart: unless-stopped

  # License Server
  license-server:
    build:
      context: ./license-server
      dockerfile: Dockerfile
    container_name: helm-license-server-cloud
    environment:
      - LICENSE_SECRET=${LICENSE_SECRET}
      - PORT=8080
    ports:
      - "8082:8080"
    networks:
      - helm-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=helm
      - POSTGRES_USER=helm
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - helm-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    environment:
      - CLICKHOUSE_DB=sentinel
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - helm-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  postgres_data:
  clickhouse_data:

networks:
  helm-network:
    driver: bridge
