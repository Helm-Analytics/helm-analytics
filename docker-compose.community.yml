version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: helm-postgres
    environment:
      POSTGRES_USER: helm
      POSTGRES_PASSWORD: helmpass
      POSTGRES_DB: helm_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ClickHouse Analytics Database
  clickhouse:
    image: clickhouse/clickhouse-server
    container_name: helm-clickhouse
    environment:
      CLICKHOUSE_DB: helm_events
      CLICKHOUSE_USER: helm
      CLICKHOUSE_PASSWORD: helmpass
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user helm --password helmpass --query \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API Server
  backend:
    build: ./backend
    container_name: helm-backend
    environment:
      - DATABASE_URL=postgres://helm:helmpass@postgres:5432/helm_analytics?sslmode=disable
      - CLICKHOUSE_URL=tcp://clickhouse:9000
      - CLICKHOUSE_DB=helm_events
      - CLICKHOUSE_USER=helm
      - CLICKHOUSE_PASSWORD=helmpass
      - PORT=6060
      - DEPLOYMENT_MODE=community
      - ADMIN_SECRET=change-this-secret-key
      # Optional: Add Gemini API key for AI features
      # - GEMINI_API_KEY=your-api-key-here
    ports:
      - "6060:6060"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Dashboard
  frontend:
    build: ./frontend
    container_name: helm-frontend
    environment:
      - VITE_API_URL=http://localhost:6060
    ports:
      - "8012:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  clickhouse_data:
