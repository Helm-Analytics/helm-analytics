# Helm Analytics - Community Edition
# Self-hosted analytics and session replay platform
# 
# Quick Start:
#   docker-compose -f docker-compose.community.yml up -d
#
# Access:
#   Frontend: http://localhost:8012
#   Backend API: http://localhost:6060
#   ClickHouse: localhost:8123
#
# Environment Variables:
#   Copy .env.example to .env and customize your settings

version: '3.8'

services:
  backend:
    image: danielowenllm/sentinel-backend:latest
    container_name: helm-backend
    restart: unless-stopped
    ports:
      - "6060:6060"
    environment:
      - DATABASE_URL=postgres://sentinel:${POSTGRES_PASSWORD:-sentinel_password}@db:5432/sentinel?sslmode=disable
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-sentinel}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-sentinel_password}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-sentinel}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-community}
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production}
    depends_on:
      - db
      - clickhouse
    networks:
      - helm-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6060/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: danielowenllm/sentinel-frontend:latest
    container_name: helm-frontend
    restart: unless-stopped
    ports:
      - "8012:80"
    depends_on:
      - backend
    networks:
      - helm-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    container_name: helm-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sentinel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sentinel_password}
      - POSTGRES_DB=${POSTGRES_DB:-sentinel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - helm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: helm-clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE:-sentinel}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-sentinel}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-sentinel_password}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - helm-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  helm-network:
    driver: bridge
    name: helm-analytics-network

volumes:
  postgres_data:
    name: helm-postgres-data
  clickhouse_data:
    name: helm-clickhouse-data
