# This is the master file for your local development environment.
services:
  backend:
    image: danielowenllm/helm-analytics-backend:latest
    ports:
      - "6060:6060"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://helm:password@db:5432/helm?sslmode=disable}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-community}
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:8012
    depends_on:
      - db
      - clickhouse
    networks:
      - helm-net

  frontend:
    image: danielowenllm/helm-analytics-frontend:latest
    ports:
      - "8012:80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    networks:
      - helm-net

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=helm
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=helm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - helm-net

  clickhouse:
    image: clickhouse/clickhouse-server
    environment:
      - CLICKHOUSE_DB=helm
      - CLICKHOUSE_USER=helm
      - CLICKHOUSE_PASSWORD=password
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./backend/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - helm-net

networks:
  helm-net:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
